
{% if customer %}
    <ul>
    {% for user in customer %}
    <li><a href="{% url 'users:detail' actor.actor_id %}">{{ actor.first_name }} {{ actor.last_name }}</a></li>
        {% comment %} <p>{{user}}</p> {% endcomment %}
    {% endfor %}
    </ul>
{% else %}
    <p>No actors are available.</p>
{% endif %}
